<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="星詠み">
<meta name="theme-color" content="#05030f">
<title>星詠み</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 76 76'><rect width='76' height='76' fill='%2305030f'/><circle cx='38' cy='38' r='36' stroke='%23c9a84c' stroke-width='2' fill='none'/><circle cx='38' cy='38' r='4' fill='%23c9a84c'/></svg>">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E6%98%9F%E8%A9%A0%E3%81%BF%22%2C%22short_name%22%3A%22%E6%98%9F%E8%A9%A0%E3%81%BF%22%2C%22display%22%3A%22standalone%22%2C%22start_url%22%3A%22.%22%2C%22background_color%22%3A%22%2305030f%22%2C%22theme_color%22%3A%22%2305030f%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage/svg%2Bxml%2C%253Csvg%2520xmlns%3D%27http%3A//www.w3.org/2000/svg%27%2520viewBox%3D%270%25200%252076%252076%27%253E%253Ccircle%2520cx%3D%2738%27%2520cy%3D%2738%27%2520r%3D%2736%27%2520fill%3D%27%2523c9a84c%27/%253E%253C/svg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image/svg%2Bxml%22%7D%5D%7D">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Noto+Serif+JP:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#05030f;--ink2:#0c0820;--ink3:#130c2a;
  --gold:#c9a84c;--gold-l:#f0d080;--gold-d:#8a6e2a;
  --gold-dim:rgba(201,168,76,.14);--gold-rim:rgba(201,168,76,.28);
  --silver:#ccd6f0;--star:#f0f4ff;
  --natl:#4a9eff;--tran:#f0c040;--prog:#a060e0;
  --danger:#e05050;--success:#50c080;
  --nav-h:60px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
}
html,body{height:100%;overflow:hidden;
  background:var(--ink);color:var(--star);font-size:16px;
  font-family:'Noto Serif JP',serif;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none}

/* ═══════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════ */
#app{height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* Background */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.neb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.1;pointer-events:none;z-index:0;transition:opacity 1s}
.neb1{width:min(80vw,600px);height:min(80vw,600px);background:radial-gradient(#2d0a5a,transparent);top:-15%;right:-10%;animation:nd 22s ease-in-out infinite alternate}
.neb2{width:min(65vw,500px);height:min(65vw,500px);background:radial-gradient(#081e50,transparent);bottom:-10%;left:-10%;animation:nd 30s ease-in-out infinite alternate-reverse}
.neb3{width:min(45vw,360px);height:min(45vw,360px);background:radial-gradient(#500c22,transparent);top:38%;left:22%;animation:nd 19s ease-in-out infinite alternate}
@keyframes nd{to{transform:translate(14px,10px) scale(1.07)}}

/* Screen container */
#screens{flex:1;position:relative;overflow:hidden;z-index:1}

/* Individual screens */
.screen{
  position:absolute;inset:0;
  overflow-y:scroll;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  transform:translateX(100%);
  visibility:hidden;
  transition:transform .36s cubic-bezier(.4,0,.2,1), visibility 0s linear .36s;
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + 24px);
  background:var(--ink);
}
.screen::-webkit-scrollbar{display:none}
.screen.active{
  transform:translateX(0);
  visibility:visible;
  transition:transform .36s cubic-bezier(.4,0,.2,1), visibility 0s linear 0s;
}
.screen.behind{
  transform:translateX(-100%);
  visibility:hidden;
  transition:transform .36s cubic-bezier(.4,0,.2,1), visibility 0s linear .36s;
}

/* ═══════════════════════════════════════════════════
   BOTTOM NAVIGATION
═══════════════════════════════════════════════════ */
#nav{
  position:relative;z-index:10;flex-shrink:0;
  display:flex;
  background:rgba(8,5,22,.96);
  border-top:1px solid rgba(201,168,76,.14);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;color:rgba(204,214,240,.65);
  font-family:'Cinzel',serif;font-size:.44rem;letter-spacing:.14em;text-transform:uppercase;
  transition:color .2s;position:relative;
  -webkit-tap-highlight-color:transparent;
  border:none;background:transparent;padding:0;
}
.nav-btn.active{color:var(--gold)}
.nav-btn:active{opacity:.6}
.nav-icon{font-size:1.22rem;line-height:1}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 7px rgba(201,168,76,.55))}

/* ═══════════════════════════════════════════════════
   REUSABLE COMPONENTS
═══════════════════════════════════════════════════ */

/* Header */
.s-hd{
  padding:calc(var(--safe-t) + 18px) calc(var(--safe-r) + 20px) 0 calc(var(--safe-l) + 20px);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
}
.s-hd-left{flex:1;min-width:0}
.page-title{
  font-family:'Cinzel',serif;font-weight:900;
  font-size:clamp(1.5rem,5vw,2.1rem);letter-spacing:.18em;
  background:linear-gradient(135deg,#b08828,#f0d080,#c9a84c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.1;
}
.page-sub{font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(204,214,240,.75);font-size:.82rem;letter-spacing:.12em;margin-top:5px}
.hd-btn{
  background:transparent;border:1px solid rgba(201,168,76,.2);
  border-radius:8px;padding:9px 15px;color:var(--silver);
  font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;
  cursor:pointer;white-space:nowrap;
  transition:border-color .2s,color .2s,background .2s;
  -webkit-tap-highlight-color:transparent
}
.hd-btn:hover,.hd-btn:active{border-color:var(--gold);color:var(--gold-l);background:var(--gold-dim)}
.hd-btn-group{display:flex;flex-direction:column;gap:7px;align-items:flex-end}

/* Divider */
.dv{display:flex;align-items:center;gap:12px;margin:16px 20px 0}
.dv-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent)}
.dv-star{color:var(--gold);font-size:.82rem}

/* Card */
.card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.22);
  border-radius:14px;padding:18px;
  margin:14px 16px 0;
}
.card-title{
  font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.26em;
  color:var(--gold);text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px
}

/* Form */
.flabel{font-family:'Cinzel',serif;font-size:.53rem;letter-spacing:.22em;
  color:var(--silver);text-transform:uppercase;display:block;margin-bottom:6px;opacity:1}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.fcol{display:flex;flex-direction:column;gap:0}
input,select{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.18);
  border-radius:8px;color:var(--star);
  font-family:'Noto Serif JP',serif;font-size:.98rem;
  padding:12px 14px;outline:none;width:100%;
  transition:border-color .25s,box-shadow .25s;
  -webkit-appearance:none;appearance:none;
}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 18px rgba(201,168,76,.07)}
select option{background:#0c0820}

/* Buttons */
.btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg,rgba(201,168,76,.16),rgba(201,168,76,.07));
  border:1px solid rgba(201,168,76,.48);border-radius:10px;
  color:var(--gold-l);font-family:'Cinzel',serif;font-size:.7rem;
  letter-spacing:.34em;text-transform:uppercase;cursor:pointer;
  transition:background .25s,box-shadow .25s,transform .12s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.97);opacity:.85}
.btn:hover{background:linear-gradient(135deg,rgba(201,168,76,.26),rgba(201,168,76,.13));
  box-shadow:0 4px 26px rgba(201,168,76,.14)}
.btn.sm{padding:10px;font-size:.58rem;letter-spacing:.22em;width:auto;flex:1}
.btn.ghost{background:transparent;border-color:rgba(168,184,216,.22);color:var(--silver)}
.btn.ghost:hover{border-color:rgba(168,184,216,.45);color:var(--star)}
.btn-row{display:flex;gap:10px;margin-top:6px}

/* Date nav */
.dnav{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:8px}
.dnav-btn{
  background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);
  border-radius:6px;color:var(--gold);font-family:'Cinzel',serif;
  font-size:.56rem;letter-spacing:.08em;padding:7px 11px;cursor:pointer;
  transition:background .15s;-webkit-tap-highlight-color:transparent;
}
.dnav-btn:active{background:rgba(201,168,76,.2)}
.dnav-today{
  background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.32);
  border-radius:6px;color:var(--gold-l);font-family:'Cinzel',serif;
  font-size:.54rem;letter-spacing:.14em;padding:7px 13px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:background .15s
}
.dnav-today:active{background:rgba(201,168,76,.22)}
.dnav-sep{width:1px;height:20px;background:rgba(201,168,76,.12)}

/* ═══════════════════════════════════════════════════
   PERSON LIST
═══════════════════════════════════════════════════ */
.plist{padding:0 16px}
.pcard{
  display:flex;align-items:center;gap:14px;padding:15px 14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.2);
  border-radius:13px;margin-bottom:10px;
  cursor:pointer;transition:background .18s,border-color .18s;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:linear-gradient(to bottom,var(--gold),var(--gold-d));
  opacity:0;transition:opacity .2s}
.pcard:active{background:rgba(255,255,255,.04)}
.pcard.sel{border-color:rgba(201,168,76,.38);background:rgba(201,168,76,.05)}
.pcard.sel::before{opacity:1}
.pava{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:1.3rem;flex-shrink:0;
  border:1px solid rgba(201,168,76,.22)}
.pinfo{flex:1;min-width:0}
.pname{font-family:'Cormorant Garamond',serif;font-size:1.06rem;
  color:var(--gold-l);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmeta{font-family:'Cinzel',serif;font-size:.49rem;letter-spacing:.1em;
  color:rgba(204,214,240,.72);margin-top:3px}
.pdel{background:transparent;border:none;color:rgba(224,80,80,.28);
  cursor:pointer;padding:8px 6px;font-size:.95rem;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;transition:color .18s}
.pdel:active{color:var(--danger)}
.pedit{background:transparent;border:none;color:rgba(201,168,76,.28);
  cursor:pointer;padding:8px 6px;font-size:.82rem;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;transition:color .18s;
  font-family:'Cinzel',serif;letter-spacing:.06em;font-size:.52rem}
.pedit:active{color:var(--gold)}
.empty{text-align:center;padding:56px 24px;
  color:rgba(168,184,216,.28);font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:.94rem;line-height:2}
.empty-ico{font-size:2.4rem;display:block;margin-bottom:12px;opacity:.35}

/* Search */
.search-wrap{margin:12px 16px 0;position:relative}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:.9rem;opacity:.3;pointer-events:none}
.search-wrap input{padding-left:38px}

/* ═══════════════════════════════════════════════════
   RESULT SCREEN
═══════════════════════════════════════════════════ */
.res-hd{
  padding:calc(var(--safe-t) + 14px) calc(var(--safe-r) + 16px) 0 calc(var(--safe-l) + 16px);
  display:flex;align-items:center;gap:12px
}
.back-btn{
  background:transparent;border:1px solid rgba(201,168,76,.2);
  border-radius:8px;padding:9px 14px;color:var(--silver);
  font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.14em;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:border-color .18s,color .18s;white-space:nowrap;flex-shrink:0
}
.back-btn:active{border-color:var(--gold);color:var(--gold-l)}
.res-name{font-family:'Cormorant Garamond',serif;font-size:1.12rem;
  color:var(--gold-l);flex:1;min-width:0;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.res-meta{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:.76rem;color:rgba(204,214,240,.72);letter-spacing:.1em;
  padding:6px 20px 0;line-height:1.65}

/* Wheel */
.wheel-wrap{padding:0 16px;margin-top:14px}
.wlegend{display:flex;justify-content:center;gap:18px;margin-bottom:8px}
.wleg{display:flex;align-items:center;gap:5px;font-family:'Cinzel',serif;
  font-size:.5rem;letter-spacing:.15em;color:var(--star);text-transform:uppercase}
.wleg-dot{width:8px;height:8px;border-radius:50%}
#wheel{width:100%;height:auto;display:block;border-radius:50%;
  box-shadow:0 0 50px rgba(201,168,76,.05)}

/* Planet tabs */
.tabs{display:flex;margin:16px 16px 0;
  border:1px solid rgba(201,168,76,.18);border-radius:8px;overflow:hidden}
.tab{flex:1;padding:10px;font-family:'Cinzel',serif;font-size:.54rem;
  letter-spacing:.18em;text-transform:uppercase;text-align:center;cursor:pointer;
  color:rgba(204,214,240,.7);background:transparent;border:none;
  transition:background .18s,color .18s;-webkit-tap-highlight-color:transparent}
.tab:not(:last-child){border-right:1px solid rgba(201,168,76,.18)}
.tab.active{background:rgba(201,168,76,.11);color:var(--gold-l)}
.tab:active{opacity:.65}

/* Planet table */
.pt-hd{display:grid;grid-template-columns:26px 58px 1fr 70px 1fr;gap:5px;
  padding:7px 16px;font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.16em;
  color:rgba(204,214,240,.6);text-transform:uppercase;
  border-bottom:1px solid rgba(201,168,76,.08)}
.ptable{display:none;padding:0 4px}
.ptable.active{display:block;animation:fadeUp .3s ease both}
.prow{display:grid;grid-template-columns:26px 58px 1fr 70px 1fr;gap:5px;
  align-items:center;padding:9px 12px;border-radius:7px;
  border-bottom:1px solid rgba(255,255,255,.05);
  font-size:.86rem;opacity:0;transform:translateX(-4px);
  transition:opacity .35s,transform .35s,background .15s}
.prow:active{background:rgba(255,255,255,.03)}
.prow.in{opacity:1;transform:translateX(0)}
.p-sym{font-size:1rem;text-align:center}
.p-nm{font-family:'Cormorant Garamond',serif;font-size:.94rem;color:var(--star)}
.p-sg{font-weight:500}
.p-dg{font-family:'Cinzel',serif;font-size:.64rem;color:rgba(204,214,240,.8)}
.col-nat .p-sg{color:#6ab8ff}.col-nat .p-sym{color:#4a9eff}
.col-tr  .p-sg{color:#f0d060}.col-tr  .p-sym{color:#f0c040}
.col-pr  .p-sg{color:#c080f0}.col-pr  .p-sym{color:#a060e0}
.asp-badge{display:inline-block;padding:2px 5px;border-radius:5px;
  font-size:.52rem;font-family:'Cinzel',serif;letter-spacing:.05em}
.asp-conj  {background:rgba(240,200,80,.11);color:#f0d060;border:1px solid rgba(240,200,80,.24)}
.asp-trine {background:rgba(80,200,140,.09);color:#60d0a0;border:1px solid rgba(80,200,140,.2)}
.asp-square{background:rgba(220,80,80,.09) ;color:#e07070;border:1px solid rgba(220,80,80,.2)}
.asp-sext  {background:rgba(80,160,240,.09);color:#70b8f0;border:1px solid rgba(80,160,240,.2)}
.asp-opp   {background:rgba(200,80,180,.09);color:#d070c0;border:1px solid rgba(200,80,180,.2)}

/* Interpretation */
.interp{margin:18px 16px 0}
.icard{background:rgba(255,255,255,.018);border:1px solid rgba(201,168,76,.1);
  border-radius:12px;padding:15px;margin-bottom:10px;
  transition:border-color .18s}
.icard:active{border-color:rgba(201,168,76,.24)}
.ic-tag{font-family:'Cinzel',serif;font-size:.51rem;letter-spacing:.2em;
  color:var(--gold);text-transform:uppercase;margin-bottom:5px}
.ic-main{font-family:'Cormorant Garamond',serif;font-size:1rem;
  color:var(--gold-l);margin-bottom:5px}
.ic-desc{font-size:.8rem;color:var(--star);line-height:1.85;opacity:1}
.interp-2col{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tr-block{background:rgba(255,255,255,.015);border-left:2px solid var(--tran);
  border-radius:0 9px 9px 0;padding:13px 15px;margin-bottom:9px}
.tr-block.prog{border-left-color:var(--prog)}
.tb-ttl{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.2em;
  color:var(--tran);text-transform:uppercase;margin-bottom:5px}
.tr-block.prog .tb-ttl{color:var(--prog)}
.tb-txt{font-size:.82rem;line-height:1.88;color:var(--star)}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 14px);left:50%;
  transform:translateX(-50%) translateY(60px);
  background:rgba(10,6,26,.97);border:1px solid var(--gold);border-radius:10px;
  padding:11px 20px;font-family:'Cinzel',serif;font-size:.61rem;letter-spacing:.16em;
  color:var(--gold-l);z-index:9999;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;pointer-events:none;white-space:nowrap;max-width:90vw;
  box-shadow:0 4px 24px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ═══════════════════════════════════════════════════
   MODALS (bottom sheet on mobile)
═══════════════════════════════════════════════════ */
.moverlay{
  position:fixed;inset:0;background:rgba(5,3,15,.88);z-index:1000;
  display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)
}
.moverlay.open{display:flex;animation:mIn .26s ease both}
@keyframes mIn{from{opacity:0}to{opacity:1}}
.msheet{
  background:linear-gradient(180deg,#110b2a,#0c0820);
  border:1px solid rgba(201,168,76,.2);
  border-radius:20px 20px 0 0;
  padding:0 20px calc(20px + var(--safe-b));
  width:100%;max-width:540px;
  animation:sheetUp .28s cubic-bezier(.2,.8,.4,1) both
}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
.mhandle{width:38px;height:4px;background:rgba(255,255,255,.1);
  border-radius:2px;margin:14px auto 20px}
.mttl{font-family:'Cinzel',serif;font-size:.74rem;letter-spacing:.28em;
  color:var(--gold);text-transform:uppercase;margin-bottom:14px}
.mbody{font-size:.84rem;color:var(--silver);line-height:1.75;margin-bottom:18px}
.mbody code{font-family:monospace;background:rgba(255,255,255,.06);
  padding:2px 6px;border-radius:3px;font-size:.79rem;color:var(--gold-l)}
.mactions{display:flex;gap:9px}
.mbtn{flex:1;padding:13px;font-family:'Cinzel',serif;font-size:.59rem;
  letter-spacing:.2em;text-transform:uppercase;border-radius:9px;cursor:pointer;
  transition:background .18s;-webkit-tap-highlight-color:transparent}
.mbtn.cancel{background:transparent;border:1px solid rgba(168,184,216,.2);color:var(--silver)}
.mbtn.confirm{background:rgba(201,168,76,.14);border:1px solid var(--gold);color:var(--gold-l)}
.mbtn.danger{background:rgba(224,80,80,.1);border:1px solid var(--danger);color:var(--danger)}
.mbtn:active{opacity:.65}
#csv-input{display:none}

/* ═══════════════════════════════════════════════════
   LOADING
═══════════════════════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:800;display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:18px;
  background:rgba(5,3,15,.75);backdrop-filter:blur(8px)
}
#loader.on{display:flex}
.ring{width:48px;height:48px;
  border:1.5px solid rgba(201,168,76,.1);border-top-color:var(--gold);
  border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--silver);font-size:.92rem;letter-spacing:.2em}

/* ═══════════════════════════════════════════════════
   PWA INSTALL BANNER
═══════════════════════════════════════════════════ */
#install-banner{
  position:fixed;top:calc(var(--safe-t) + 10px);left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:rgba(10,6,26,.97);border:1px solid var(--gold);
  border-radius:12px;padding:12px 18px;
  display:flex;align-items:center;gap:12px;
  font-family:'Cinzel',serif;font-size:.59rem;letter-spacing:.14em;
  color:var(--gold-l);z-index:9998;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  max-width:calc(100vw - 32px);box-shadow:0 8px 32px rgba(0,0,0,.6)
}
#install-banner.show{transform:translateX(-50%) translateY(0)}
#install-banner button{
  background:rgba(201,168,76,.16);border:1px solid var(--gold);
  border-radius:6px;color:var(--gold-l);font-family:'Cinzel',serif;
  font-size:.54rem;letter-spacing:.12em;padding:6px 12px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;white-space:nowrap
}
#install-banner .ib-close{
  background:transparent;border:none;color:rgba(168,184,216,.4);
  font-size:.9rem;cursor:pointer;padding:0 2px;
  -webkit-tap-highlight-color:transparent
}

/* ═══════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════════════
   SIGIL
═══════════════════════════════════════════════════ */
.sigil{width:58px;height:58px;position:relative;flex-shrink:0}
.sigil svg{width:100%;height:100%}
.sr1{position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(201,168,76,.18);animation:spin 28s linear infinite}
.sr2{position:absolute;inset:-20px;border-radius:50%;border:1px dashed rgba(201,168,76,.07);animation:spin 54s linear infinite reverse}

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
@media(min-width:600px){

select::placeholder{color:rgba(204,214,240,.35)}

<script>

/* ─── STARFIELD ─── */
(()=>{
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  let stars=[];
  const resize=()=>{c.width=innerWidth;c.height=innerHeight};
  const init=()=>{stars=Array.from({length:180},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.2+.2,a:Math.random()*.7+.2,sp:Math.random()*.0007+.0002,ph:Math.random()*Math.PI*2}))};
  const draw=t=>{ctx.clearRect(0,0,c.width,c.height);stars.forEach(p=>{const a=p.a*(.45+.55*Math.sin(t*p.sp*1000+p.ph));ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(232,238,255,${a})`;ctx.fill()});requestAnimationFrame(draw)};
  window.addEventListener('resize',()=>{resize();init()});
  resize();init();requestAnimationFrame(draw);
})();

const D2R=Math.PI/180, R2D=180/Math.PI;

function jdUT(y,m,d,hUT){
  if(m<=2){y--;m+=12;}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+hUT/24+B-1524.5;
}
function norm360(x){return((x%360)+360)%360;}

/* ── VSOP87 級数評価 (tau = Julian millennia from J2000) ── */
function vsop(ser,tau){
  let r=0;
  for(let k=0;k<ser.length;k++){
    let s=0;const sk=ser[k];
    for(let i=0;i<sk.length;i++) s+=sk[i][0]*Math.cos(sk[i][1]+sk[i][2]*tau);
    r+=s*Math.pow(tau,k);
  }
  return r/1e8; // radians
}

/* ── FK5補正 (Meeus p.219) ── */
function fk5Corr(L,B,T){
  const Lp=L-1.397*T-0.00031*T*T;
  const dL=-0.09033+0.03916*(cosr(Lp)-sinr(Lp))*Math.tan(B*D2R);
  const dB= 0.03916*(cosr(Lp)+sinr(Lp));
  return {dL:dL/3600, dB:dB/3600};
}

/* ── 光行時補正: 惑星の光行時 (kappa=20.4898"/AU) ── */
function aberrationCorr(R){
  // 地球の年周光行差 (Meeus p.151): 黄経に -kappa/R を加算
  return -20.4898/(R*3600); // degrees
}

/* ── ヘリオセントリック → ジオセントリック (FK5+光行差補正付) ── */
function geoLon(pL,pB,pR, tau){
  const T=tau*10;
  const Le=vsop(EL,tau), Be=vsop(EB,tau), Re=vsop(ER,tau);
  const Lp=vsop(pL,tau), Bp=vsop(pB,tau), Rp=vsop(pR,tau);
  // FK5補正 (惑星ヘリオセントリック)
  const f=fk5Corr(Lp*R2D,Bp*R2D,T);
  const Lp2=Lp+f.dL*D2R;
  // 直交座標変換
  const xe=Re*Math.cos(Be)*Math.cos(Le), ye=Re*Math.cos(Be)*Math.sin(Le);
  const xp=Rp*Math.cos(Bp)*Math.cos(Lp2), yp=Rp*Math.cos(Bp)*Math.sin(Lp2);
  let lon=norm360(Math.atan2(yp-ye,xp-xe)*R2D);
  // 光行差補正
  lon=norm360(lon+aberrationCorr(Rp));
  // 章動補正
  const nut=nutation(T);
  lon=norm360(lon+nut.dpsi);
  return lon;
}

/* ── 太陽 (Meeus Ch.25 + FK5 + 章動 + 光行差) ── */
function sunLon(y,m,d,hJST){
  const JD=jdUT(y,m,d,hJST-9), T=(JD-2451545.0)/36525.0, T2=T*T;
  const tau=T/10;
  // 地球VSOP87から太陽ジオセントリック黄経
  const Le=vsop(EL,tau), Be=vsop(EB,tau), Re=vsop(ER,tau);
  // 太陽の黄経 = 地球の黄経 + 180°
  let lon=norm360(Le*R2D+180);
  // FK5補正
  const f=fk5Corr(lon,(-Be*R2D),T);
  lon=norm360(lon+f.dL);
  // 光行差 (太陽) -20.4898"/Re
  lon=norm360(lon-20.4898/(Re*3600));
  // 章動
  const nut=nutation(T);
  lon=norm360(lon+nut.dpsi);
  return lon;
}

  let L=(238.928+145.2078*T)%360;
  let M=(14.86+145.18*T)%360;
  const e=0.2488;
  // 中心差3次補正
  const mRad=M*D2R;
  const C=(2*e-0.25*Math.pow(e,3))*Math.sin(mRad)
         +(1.25*Math.pow(e,2))*Math.sin(2*mRad)
         +(1.0833*Math.pow(e,3))*Math.sin(3*mRad);
  let lon=(L+C/D2R)%360;
  // 海王星共鳴補正 (1900-2100年用)
  const drift=0.015*Math.sin((L-110)*D2R);
  lon=((lon+drift)%360+360)%360;
  // 他の惑星(geoLon)と同じ章動補正を適用して精度を揃える
  const nut=nutation(T);
  return norm360(lon+nut.dpsi);
}

/* ── calcPos & calcProg ── */
/* hJST : 日本標準時（時刻）。内部でUTに変換して全天体を同一基準で計算 */
function calcPos(y,m,d,hJST){
  const hUT=hJST-9;
  const JD=jdUT(y,m,d,hUT), T=(JD-2451545.0)/36525.0, tau=T/10;
  const RAD=D2R;

  // ── 太陽 (Meeus Ch.25 + VSOP87 FK5 章動 光行差) ──
  const sun=sunLon(y,m,d,hJST);

  // ── 月 (ELP2000-82B) ──
  const moon=moonLon(y,m,d,hJST);

  // ── 冥王星 (改訂版ケプラー式 + 章動補正) ──
  const pluto=plutoLon(T);

  // ── 内惑星・外惑星 (VSOP87 完全展開) ──
  const mercury=geoLon(MeL,MeB,MeR,tau);
  const venus  =geoLon(VeL,VeB,VeR,tau);
  const mars   =geoLon(MaL,MaB,MaR,tau);
  const jupiter=geoLon(JuL,JuB,JuR,tau);
  const saturn =geoLon(SaL,SaB,SaR,tau);
  const uranus =geoLon(UrL,UrB,UrR,tau);
  const neptune=geoLon(NeL,NeB,NeR,tau);

  return{sun,moon,mercury,venus,mars,jupiter,saturn,uranus,neptune,pluto};
}

/* JD → {y,m,d,hJST} 変換（プログレス用） */
function jdToDate(JD){
  const JD2=JD+0.5;
  const z=Math.floor(JD2), f=JD2-z;
  let A=z;
  if(z>=2299161){const g=Math.floor((z-1867216.25)/36524.25);A=z+1+g-Math.floor(g/4);}
  const B=A+1524,C=Math.floor((B-122.1)/365.25),D=Math.floor(365.25*C),E=Math.floor((B-D)/30.6001);
  const dd=B-D-Math.floor(30.6001*E);
  const mm=E<14?E-1:E-13;
  const yy=mm>2?C-4716:C-4715;
  const hUT=f*24;       // UT 時刻
  const hJST=hUT+9;     // JST 時刻
  return{y:yy,m:mm,d:dd,hJST:hJST};
}

/* 二次進行法（Secondary Progressions）
   原理: 生後1太陽年 = 進行図の1日
   精度向上: 整数日ではなく小数日（時刻まで）を用いる
   太陽年 = 365.24219日（平均回帰年）を使用 */
const TROPICAL_YEAR=365.24219;
function calcProg(by,bm,bd,bHJST,tJD){
  const bJD=jdUT(by,bm,bd,bHJST-9);
  // 経過年数（太陽年基準）
  const ageYears=(tJD-bJD)/TROPICAL_YEAR;
  const ageDays=Math.max(0,ageYears); // 太陽年 → 対応日数（小数含む）
  // 進行JD = 出生JD + 経過日数（小数まで含む）
  const progJD=bJD+ageDays;
  // JD → 年月日+時刻に変換
  const dt=jdToDate(progJD);
  // 時刻が24時以上になる場合の繰り越し処理
  let hj=dt.hJST;
  let dd=dt.d, mm=dt.m, yy=dt.y;
  if(hj>=24){
    hj-=24;
    // 翌日に繰り越し（JDに1を加えて再変換）
    const dt2=jdToDate(progJD+1);
    dd=dt2.d; mm=dt2.m; yy=dt2.y;
  }
  return calcPos(yy,mm,dd,hj);
}

/* ── ASPECTS ── */
const ASP=[
  {name:'合',  angle:0,  orb:8,cls:'asp-conj'},
  {name:'六分',angle:60, orb:5,cls:'asp-sext'},
  {name:'四分',angle:90, orb:7,cls:'asp-square'},
  {name:'三分',angle:120,orb:8,cls:'asp-trine'},
  {name:'衝',  angle:180,orb:8,cls:'asp-opp'},
];
function getAsp(a,b){
  let d=Math.abs(a-b);if(d>180)d=360-d;
  for(let i=0;i<ASP.length;i++)if(Math.abs(d-ASP[i].angle)<=ASP[i].orb)return ASP[i];
  return null;
}
function findAsps(p1,p2){
  const r={};
  PLANETS.forEach(function(p){
    let best=null,bo=99;
    PLANETS.forEach(function(q){
      const asp=getAsp(p1[p.key],p2[q.key]);
      if(asp){
        let d=Math.abs(p1[p.key]-p2[q.key]);if(d>180)d=360-d;
        const o=Math.abs(d-asp.angle);
        if(o<bo){bo=o;best={asp:asp,withSym:q.sym};}
      }
    });
    r[p.key]=best;
  });
  return r;
}

  persons.forEach(p=>{const si=sunSignIdx(p.dob);rows.push([p.name,p.dob||'',p.memo||'',p.added?p.added.slice(0,10):'',si!==null?SIGNS[si].ja:''])});
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='hoshi_yomi_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href);

document.getElementById('csv-input').addEventListener('change',function(e){
  closeM('m-import');const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    let text=ev.target.result;if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length){toast('CSVが空です');return}
    let added=0,skip=0;
    lines.forEach(function(line,i){
      const c=parseCSV(line);if(!c.length)return;
      const nm=(c[0]||'').trim(),dob=(c[1]||'').trim(),memo=(c[2]||'').trim();
      if(i===0&&(nm==='名前'||nm==='Name'||nm==='name'))return;
      if(!nm)return;
      if(dob&&!/^\d{4}-\d{2}-\d{2}$/.test(dob)){skip++;return}
      if(persons.some(p=>p.name===nm)){skip++;return}
      persons.push({id:genId(),name:nm,dob,memo,added:new Date().toISOString()});added++;
    });
    savePersons();renderList();
    toast('✦ '+added+'名を追加'+(skip>0?' ('+skip+'件スキップ)':''));
    e.target.value='';
  };
  reader.readAsText(file,'UTF-8');
});
function parseCSV(line){
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
    else if(c===','&&!inQ){r.push(cur);cur=''}
    else cur+=c;
  }
  r.push(cur);return r;
}

/* ─── WHEEL ─── */
function drawWheel(nat,tr,pr){
  const cv=document.getElementById('wheel');
  const sz=Math.max(220,Math.min(cv.parentElement.offsetWidth||340,420));
  cv.width=sz;cv.height=sz;
  const ctx=cv.getContext('2d'),cx=sz/2,cy=sz/2,R=sz/2-4,D=Math.PI/180;
  ctx.fillStyle='rgba(5,3,15,0.72)';ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  for(let i=0;i<12;i++){
    const a0=(i*30-90)*D,a1=((i+1)*30-90)*D,am=a0+Math.PI/12,s=SIGNS[i];
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,a0,a1);ctx.closePath();
    ctx.fillStyle=s.color+'11';ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+R*.72*Math.cos(a0),cy+R*.72*Math.sin(a0));ctx.lineTo(cx+R*Math.cos(a0),cy+R*Math.sin(a0));
    ctx.strokeStyle='rgba(201,168,76,0.17)';ctx.lineWidth=.7;ctx.stroke();
    ctx.font=(sz*.051)+'px serif';ctx.fillStyle=s.light+'b0';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(s.sym,cx+R*.86*Math.cos(am),cy+R*.86*Math.sin(am));
  }
  [[R,.5,'rgba(201,168,76,0.38)'],[R*.72,.3,'rgba(201,168,76,0.12)'],[R*.5,.28,'rgba(100,140,201,0.1)'],[R*.3,.24,'rgba(160,100,220,0.09)']].forEach(([r,lw,c])=>{
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.stroke()
  });
  function drawP(pos,rR,col){
    const placed=[];
    PLANETS.forEach(p=>{
      const lon=pos[p.key];let r=rR;
      const ang=(lon-90)*D;
      placed.forEach(pl=>{let d=Math.abs(lon-pl);if(d>180)d=360-d;if(d<8)r-=sz*.034});
      const x=cx+r*Math.cos(ang),y=cy+r*Math.sin(ang);
      ctx.beginPath();ctx.arc(x,y,sz*.021,0,Math.PI*2);ctx.fillStyle='rgba(5,3,15,0.8)';ctx.fill();
      ctx.strokeStyle=col+'65';ctx.lineWidth=.6;ctx.stroke();
      ctx.font=(sz*.031)+'px serif';ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p.sym,x,y);
      ctx.beginPath();ctx.moveTo(cx+R*.73*Math.cos(ang),cy+R*.73*Math.sin(ang));ctx.lineTo(cx+R*.77*Math.cos(ang),cy+R*.77*Math.sin(ang));
      ctx.strokeStyle=col+'58';ctx.lineWidth=.85;ctx.stroke();
      placed.push(lon);
    });
  }
  drawP(nat, R*.61,'#4a9eff');
  drawP(tr,  R*.42,'#f0c040');
  drawP(pr,  R*.24,'#a060e0');
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R*.15);
  g.addColorStop(0,'rgba(201,168,76,0.1)');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R*.15,0,Math.PI*2);ctx.fill();
}

   {cls:'prog',tit:'☉ プログレス太陽 → '+pSun.ja,txt:pSun.ja===nSun.ja?'プログレス太陽はネイタルと同じ'+pSun.ja+'。出生テーマを深く熟成させる時期。':'プログレス太陽が'+pSun.ja+'へ移行。人生テーマが静かに変容しています。'},
   {cls:'prog',tit:'☽ プログレス月 → '+pMoon.ja,txt:'プログレス月は約2〜2.5年ごとにサインを移動。現在'+pMoon.ja+'に位置し感情の成長テーマを示しています。'},
  ].forEach((b,i)=>{
    const d=document.createElement('div');d.className='tr-block '+b.cls;
    d.innerHTML='<div class="tb-ttl">'+b.tit+'</div><div class="tb-txt">'+b.txt+'</div>';
    tc.appendChild(d);setTimeout(()=>d.style.animation='fadeUp .4s ease both',80+i*90);
  });
}

/* ─── TAB ─── */
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['natal','transit','progress'][i]===t));
  document.querySelectorAll('.ptable').forEach(el=>el.classList.toggle('active',el.id==='tab-'+t));
  const nw=document.getElementById('iw-natal'),tw=document.getElementById('iw-tr');
  if(t==='natal'){nw.style.display='';tw.style.display='none'}
  else{
    nw.style.display='none';tw.style.display='';
    document.querySelectorAll('.tr-block').forEach(el=>{
      if(t==='transit')el.style.display=el.classList.contains('prog')?'none':'';
      else el.style.display=el.classList.contains('prog')?'':'none';
    });
  }
}

/* ─── CAST ─── */
const H=0;
function doCast(){
  const p=persons.find(x=>x.id===curPid);if(!p)return;
  const[by,bm,bd]=p.dob.split('-').map(Number);
  const tdStr=document.getElementById('tdate').value;
  const now=new Date();
  const ty=tdStr?+tdStr.split('-')[0]:now.getFullYear();
  const tm=tdStr?+tdStr.split('-')[1]:now.getMonth()+1;
  const td=tdStr?+tdStr.split('-')[2]:now.getDate();
  document.getElementById('loader').classList.add('on');
  requestAnimationFrame(()=>setTimeout(()=>{
    try{
      const nat=calcPos(by,bm,bd,H);
      const tr=calcPos(ty,tm,td,H);
      const bJD=jdUT(by,bm,bd,H-9),tJD=jdUT(ty,tm,td,H-9);
      const pr=calcProg(by,bm,bd,H,tJD);
      const trAsp=findAsps(tr,nat),prAsp=findAsps(pr,nat);
      const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      const ageY=(tJD-bJD)/365.24219;
      const pDt=jdToDate(bJD+Math.max(0,ageY));
      document.getElementById('res-name').textContent=p.name;
      document.getElementById('r-meta').textContent=
        '出生 '+by+'年'+mn[bm-1]+bd+'日 ｜ 占い日 '+ty+'年'+mn[tm-1]+td+'日 ｜ 進行 '+pDt.y+'年'+mn[pDt.m-1]+pDt.d+'日';
      curResult={nat,tr,pr};
      drawWheel(nat,tr,pr);
      renderTable('tab-natal',   nat,'col-nat',null);
      renderTable('tab-transit', tr, 'col-tr', trAsp);
      renderTable('tab-progress',pr, 'col-pr', prAsp);
      renderInterp(nat,tr,pr);
      switchTab('natal');
      document.getElementById('loader').classList.remove('on');
      navTo('result');
      document.getElementById('sc-result').scrollTop=0;
    }catch(err){
      document.getElementById('loader').classList.remove('on');
      toast('エラー: '+err.message);console.error(err);
    }
  },30));
}

/* ─── PWA INSTALL ─── */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  setTimeout(()=>document.getElementById('install-banner').classList.add('show'),2000);
});
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('install-banner').classList.remove('show');
  if(outcome==='accepted')toast('✦ ホーム画面に追加しました');
});
document.getElementById('install-close').addEventListener('click',()=>{
  document.getElementById('install-banner').classList.remove('show');
});


/* ─── SERVICE WORKER (PWA offline) ─── */
if('serviceWorker' in navigator){
  const swCode = `
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open('hoshi-v1').then(c => c.addAll([location.pathname]))
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request))
  );
});
`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob))
    .catch(()=>{});
}


/* ─── SWIPE BACK GESTURE ─── */
(()=>{
  let sx=0,sy=0,sw=false;
  const screens=document.getElementById('screens');
  screens.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;sw=sx<32;
  },{passive:true});
  screens.addEventListener('touchend',e=>{
    if(!sw)return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    if(dx>60&&dy<60){
      const order=['home','cast','result'];
      const ci=order.indexOf(curScreen);
      if(ci>0)navTo(order[ci-1]);
    }
    sw=false;
  },{passive:true});
})();

/* ─── INIT ─── */
window.addEventListener('load',()=>{
  const now=new Date();
  document.getElementById('tdate').value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  loadPersons();renderList();
});
